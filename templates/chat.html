<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuition Centre WhatsApp Bot Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b141a; height: 100vh; display: flex; justify-content: center; align-items: center; }
.phone-frame { width: 400px; height: 700px; background: #0b141a; border-radius: 30px; border: 3px solid #333; overflow: hidden; display: flex; flex-direction: column; }
.wa-header { background: #1f2c34; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.wa-header .avatar { width: 40px; height: 40px; border-radius: 50%; background: #00a884; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
.wa-header .info h3 { color: #e9edef; font-size: 16px; }
.wa-header .info p { color: #8696a0; font-size: 12px; }
.chat-area { flex: 1; overflow-y: auto; padding: 12px; background: #0b141a; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="wa-header">
    <div class="avatar">TC</div>
    <div class="info">
      <h3>Tuition Centre</h3>
      <p id="status">online</p>
    </div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div style="padding: 8px; background: #1f2c34; display: flex; gap: 8px;">
    <input type="text" id="msgInput" placeholder="Type a message"
      style="flex:1; padding: 10px 16px; border-radius: 20px; border: none; background: #2a3942; color: #e9edef; font-size: 14px; outline: none;"
      onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()"
      style="width: 44px; height: 44px; border-radius: 50%; border: none; background: #00a884; color: white; font-size: 18px; cursor: pointer;">&#10148;</button>
  </div>
  <div style="padding: 6px; background: #1f2c34; text-align: center;">
    <span id="phoneLabel" style="color: #8696a0; font-size: 11px;"></span>
  </div>
</div>
<script>
const phone = prompt("Enter your phone number (e.g. +60123456789):", "+60123456789") || "+60123456789";
document.getElementById("phoneLabel").textContent = "Demo as: " + phone;

function addMsg(text, sent) {
  const d = document.createElement("div");
  d.style.cssText = `max-width:80%;padding:8px 12px;margin:4px 0;border-radius:8px;font-size:14px;line-height:1.4;word-wrap:break-word;clear:both;float:${sent?"right":"left"};background:${sent?"#005c4b":"#1f2c34"};color:#e9edef;`;
  d.textContent = text;
  const chatArea = document.getElementById("chatArea");
  chatArea.appendChild(d);
  const br = document.createElement("div");
  br.style.clear = "both";
  chatArea.appendChild(br);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById("msgInput");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  addMsg(msg, true);
  document.getElementById("status").textContent = "typing...";
  try {
    const r = await fetch("/webhook", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({phone: phone, message: msg}) });
    const data = await r.json();
    addMsg(data.reply, false);
    if (data.lead_complete) { addMsg("✅ Lead captured! Check /leads endpoint.", false); }
  } catch(e) { addMsg("Error: " + e.message, false); }
  document.getElementById("status").textContent = "online";
}
</script>
</body>
</html>
